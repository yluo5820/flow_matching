experiment: illumination_photometry_pilot
seed: 71
objects:
  - abstract_statue
n_samples: 2000
image_size: 64
background: gray
antialias: true

render_modes:
  - colored
  - gray_directional
  - gray_ambient

factor_spaces:
  - LightingDirectionSphere
  - LightLogEnergyInterval:
      bounds: [-0.8, 0.8]
  - AmbientLightInterval:
      bounds: [0.05, 0.75]
  - DiffuseLightInterval:
      bounds: [0.05, 1.10]
  - ImageLogExposureInterval:
      bounds: [-0.6, 0.4]
  - IlluminationFactor:
      name: illumination
      energy_log_bounds: [-0.8, 0.8]
      ambient_bounds: [0.05, 0.75]
      diffuse_bounds: [0.05, 1.10]
  - PhotometryFactor:
      name: photometry
      energy_log_bounds: [-0.8, 0.8]
      ambient_bounds: [0.05, 0.75]
      diffuse_bounds: [0.05, 1.10]
      exposure_log_bounds: [-0.6, 0.4]
  - FullAppearanceFactor:
      name: full_appearance
      energy_log_bounds: [-0.8, 0.8]
      ambient_bounds: [0.05, 0.75]
      diffuse_bounds: [0.05, 1.10]
      exposure_log_bounds: [-0.6, 0.4]

camera_config:
  radius: 4.0
  elevation: 20.0
  focal_length: 70.0

light_config:
  position: [3.0, -4.0, 5.0]
  distance: 6.0
  energy: 400.0
  ambient: 0.35
  diffuse: 0.70

diagnostics:
  pullback_metric: true
  product_structure: true
  latent_pixel: true
  umap: false
  pullback_metric_points: 64
  pullback_eps: 0.01
  knn_samples: 1000
  latent_pixel_distance_pairs: 20000
  knn_k: [15]

output:
  save_pngs: false
