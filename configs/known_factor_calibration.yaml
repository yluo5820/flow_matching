experiment: known_factor_calibration
seed: 42
objects:
  - cube
  - abstract_statue
  - offset_monument
factor_spaces:
  - AzimuthCircle
  - LookAtViewSphere
  - BoundedTranslation2D
  - CameraRadiusInterval
render_modes:
  - silhouette
  - depth
  - normal
  - gray_ambient
  - gray_directional
  - colored
n_samples: 10000
image_size: 64
background: white
antialias: true

camera_config:
  radius: 4.0
  elevation: 20.0
  focal_length: 70.0
  translation_target: camera_plane

light_config:
  position: [3.0, -4.0, 5.0]
  distance: 6.0
  energy: 400.0
  ambient: 0.35
  diffuse: 0.70

output:
  save_pngs: true

diagnostics:
  umap: true
  intrinsic_dimension: true
  pullback_metric: true
  latent_pixel: true
  pullback_metric_points: 256
  latent_pixel_distance_pairs: 100000
  knn_samples: 2000
  knn_k: [15]
