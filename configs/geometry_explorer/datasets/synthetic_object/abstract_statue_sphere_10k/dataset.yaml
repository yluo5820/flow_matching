family: synthetic_object
variant: abstract_statue_sphere_10k
base: analytic
split: sphere
seed: 43

object:
  kind: abstract_statue
  scale: 1.35
  marker: false

render:
  backend: analytic
  image_size: 64
  camera_distance: 4.0
  focal_length: 70
  background: [1.0, 1.0, 1.0]
  light_position: [3.0, -4.0, 5.0]
  light_energy: 400
  ambient: 0.35
  diffuse: 0.70
  supersample: 3

pose:
  mode: sphere
  samples: 10000
  orientation_bins: 36

output:
  value_range: [0.0, 1.0]
  save_pngs: true
