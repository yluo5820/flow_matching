experiment: camera_geometry_pilot_narrow
seed: 43
objects:
  - abstract_statue
n_samples: 2000
image_size: 64
background: white
antialias: true

render_modes:
  - silhouette
  - depth
  - colored

factor_spaces:
  - CameraSE3Factor:
      name: camera_se3_narrow
      roll_bounds: [-0.20, 0.20]
      translation_bounds:
        - [-0.30, 0.30]
        - [-0.30, 0.30]
        - [-0.50, 0.50]
  - CameraIntrinsicsFactor:
      name: camera_intrinsics_k_narrow
      focal_log_bounds: [-0.20, 0.20]
      aspect_log_bounds: [-0.12, 0.12]
      principal_point_bounds:
        - [-4.0, 4.0]
        - [-4.0, 4.0]
      skew_bounds: [-0.05, 0.05]
  - FullCameraFactor:
      name: full_camera_narrow
      roll_bounds: [-0.20, 0.20]
      translation_bounds:
        - [-0.30, 0.30]
        - [-0.30, 0.30]
        - [-0.50, 0.50]
      focal_log_bounds: [-0.20, 0.20]
      aspect_log_bounds: [-0.12, 0.12]
      principal_point_bounds:
        - [-4.0, 4.0]
        - [-4.0, 4.0]
      skew_bounds: [-0.05, 0.05]

camera_config:
  radius: 4.0
  elevation: 20.0
  focal_length: 70.0
  translation_target: camera_plane

light_config:
  position: [3.0, -4.0, 5.0]
  ambient: 0.35
  diffuse: 0.70
  energy: 400.0

diagnostics:
  pullback_metric: true
  product_structure: true
  latent_pixel: true
  umap: false
  pullback_metric_points: 64
  pullback_eps: 0.001
  knn_samples: 1000
  latent_pixel_distance_pairs: 20000
  knn_k: [15]

output:
  save_pngs: false
