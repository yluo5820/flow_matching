experiment:
  name: mnist_linear_baseline
  seed: 0
  output_dir: runs/mnist_linear_baseline

data:
  name: mnist
  root: data/mnist
  train: true
  download: true
  normalize: minus_one_one
  dequantize: true

source:
  name: gaussian
  dim: 784
  std: 1.0

coupling:
  name: independent

path:
  name: linear

model:
  name: mlp
  hidden_dim: 512
  depth: 4
  activation: silu
  time_embedding_dim: 128

training:
  batch_size: 256
  steps: 50000
  lr: 1.0e-4
  log_every: 500
  time_sampling: uniform
  early_stopping:
    enabled: true
    warmup_steps: 10000
    patience_steps: 5000
    min_delta: 1.0e-3
    ema_alpha: 0.3

solvers:
  names: [euler]
  nfes: [64]
  schedule: uniform

sampling:
  n_samples: 256
  n_trajectories: 16
  nfe: 64
  plot_max_points: 64
  sample_batch_size: 256
  trajectory_umap:
    enabled: true
    max_target_points: 3000
    n_neighbors: 30
    min_dist: 0.1
    metric: euclidean
    random_state: 42
    save_coordinates: true

diagnostics:
  ambiguity:
    methods: [knn]
    t_values: [0.1, 0.3, 0.5, 0.7, 0.9]
  curvature:
    enabled: false
  solver_sensitivity:
    metrics: [mmd, sliced_wasserstein]
