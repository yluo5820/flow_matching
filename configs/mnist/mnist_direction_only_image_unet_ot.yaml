experiment:
  name: mnist_direction_only_image_unet_ot
  seed: 0
  output_dir: runs/mnist_direction_only_image_unet_ot

data:
  name: mnist
  root: data/mnist
  train: true
  download: true
  normalize: minus_one_one
  dequantize: true

source:
  name: gaussian
  dim: 784
  std: 1.0

coupling:
  name: minibatch_ot
  max_exact_size: 128

path:
  name: linear

model:
  name: direction_speed_image_unet
  image_shape: [28, 28]
  base_channels: 32
  activation: silu
  time_embedding_dim: 128
  direction_eps: 1.0e-8
  direction_zero_init_head: false
  speed_zero_init_head: true

objective:
  name: direction_only_straight
  direction_weight: 5.0
  speed_weight: 1.0
  eps: 1.0e-8

training:
  batch_size: 128
  steps: 100000
  lr: 1.0e-4
  log_every: 500
  time_sampling: uniform
  early_stopping:
    enabled: true
    warmup_steps: 20000
    patience_steps: 10000
    min_delta: 5.0e-4
    ema_alpha: 0.3

solvers:
  names: [euler]
  nfes: [64]
  schedule: uniform

sampling:
  n_samples: 256
  n_trajectories: 16
  nfe: 64
  plot_max_points: 64

diagnostics:
  ambiguity:
    methods: [knn]
    t_values: [0.1, 0.3, 0.5, 0.7, 0.9]
  curvature:
    enabled: false
  solver_sensitivity:
    metrics: [mmd, sliced_wasserstein]
