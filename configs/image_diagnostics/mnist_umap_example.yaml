explorer_name: mnist_umap

input:
  type: mnist
  dataset_root: data/mnist
  split: test
  max_samples: 2000
  sample_seed: 42
  download: false

features:
  mode: raw
  name: raw_pixels
  normalize: false
  skip_existing: true

projection:
  method: umap
  n_neighbors: 15
  min_dist: 0.1
  metric: euclidean
  random_state: 42
  also_compute_pca: true
  also_compute_tsne: false
  skip_existing: true

diagnostics:
  k_neighbors: 15
  metric: euclidean
  covariance_eigenvalues: 5
  compute_knn_radius: true
  compute_covariance_spectrum: true
  compute_participation_ratio: true
  compute_two_nn_lid: true
  compute_centroid_distances: true
  compute_outlier_score: true
  skip_existing: true

output:
  root_dir: outputs/dataset_explorer
  save_features: true
  save_projection: true
  save_diagnostics: true
  save_explorer_data: true

explorer:
  enabled: true
  app_type: streamlit
  thumbnail_size: 160
  default_color_by: label
