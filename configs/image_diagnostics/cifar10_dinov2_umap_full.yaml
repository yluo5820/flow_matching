explorer_name: cifar10_dinov2_umap_full

input:
  type: cifar10
  dataset_root: data/cifar10
  split: all
  order: source
  thumbnail_mode: atlas
  max_samples: null
  sample_seed: 42
  download: true

features:
  mode: dinov2
  name: dinov2_base_cls
  repo_id: facebook/dinov2-base
  normalize: true
  batch_size: 16
  device: auto
  dtype: float16
  skip_existing: true

projection:
  skip_existing: true
  variants:
    - name: DINOv2 UMAP 2D
      key: dinov2_umap_2d
      method: umap
      n_components: 2
      n_neighbors: 15
      min_dist: 0.1
      metric: cosine
      random_state: 42
    - name: DINOv2 UMAP 3D
      key: dinov2_umap_3d
      method: umap
      n_components: 3
      n_neighbors: 15
      min_dist: 0.1
      metric: cosine
      random_state: 42

diagnostics:
  enabled: false

output:
  root_dir: outputs/dataset_explorer
  save_features: true
  save_projection: true
  save_diagnostics: false
  save_explorer_data: true

explorer:
  enabled: true
  app_type: streamlit
  renderer: three3d
  height: 760
  sidebar_width: 300
  point_size: 14
  hover_size: 72
  atlas_tile_size: 32
  atlas_size: 2048
  selector_label: Projection
  preview_mode: original
  show_metrics: true
  show_legend: false
  show_view_controls: true
  show_instructions: false
  show_workspace: false
  compute_projection_diagnostics: true
  projection_diagnostics_k: 15

id_estimation:
  enabled: true
  config_path: configs/image_diagnostics/id_estimation_cifar10_dinov2.yaml
