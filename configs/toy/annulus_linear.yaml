experiment:
  name: annulus_linear_independent
  seed: 0
  output_dir: runs/annulus_linear_independent

data:
  name: annulus
  inner_radius: 0.8
  outer_radius: 1.6

source:
  name: gaussian
  dim: 2
  std: 1.0

coupling:
  name: independent

path:
  name: linear

model:
  name: mlp
  hidden_dim: 256
  depth: 4
  activation: silu
  time_embedding: sinusoidal

training:
  batch_size: 1024
  steps: 50000
  lr: 1.0e-4
  log_every: 500
  time_sampling: uniform

solvers:
  names: [rk4]
  nfes: [64]
  schedule: uniform

sampling:
  n_samples: 8192
  n_trajectories: 128
  nfe: 64

diagnostics:
  ambiguity:
    methods: [grid, knn]
    t_values: [0.05, 0.1, 0.2, 0.4, 0.6, 0.8, 0.95]
  geometry:
    radii: [0.8, 1.6]
  curvature:
    enabled: true
  solver_sensitivity:
    metrics: [mmd, sliced_wasserstein]
