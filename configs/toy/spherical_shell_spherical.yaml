experiment:
  name: spherical_shell_spherical_independent
  seed: 0
  output_dir: runs/spherical_shell_spherical_independent

data:
  name: spherical_shell
  dim: 3
  radius: 1.0
  noise: 0.02

source:
  name: spherical_shell
  dim: 3
  radius: 1.0
  noise: 0.0

coupling:
  name: independent

path:
  name: spherical
  interpolate_radius: true

model:
  name: mlp
  hidden_dim: 256
  depth: 4
  activation: silu
  time_embedding: sinusoidal

training:
  batch_size: 1024
  steps: 50000
  lr: 1.0e-4
  log_every: 500
  time_sampling: uniform

solvers:
  names: [rk4]
  nfes: [64]
  schedule: uniform

sampling:
  n_samples: 8192
  n_trajectories: 128
  nfe: 64

diagnostics:
  ambiguity:
    methods: [knn]
    t_values: [0.05, 0.1, 0.2, 0.4, 0.6, 0.8, 0.95]
  geometry:
    radius: 1.0
  curvature:
    enabled: true
  solver_sensitivity:
    metrics: [mmd, sliced_wasserstein]
